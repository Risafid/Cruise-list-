<!DOCTYPE html>

<title>⚓ Norwegian Fjords Cruise Tracker 2026</title>
<style>

    --gold:#c8a84b;--gold-light:#e8c86a;
    --white:#f0f4ff;--gray:#8090b0;
    --red:#e04040;--green:#2ecc71;--yellow:#f1c40f;--blue:#3498db;
    --card-bg:#0d1f3c;--card-border:#1e3560;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(160deg,#050d1a 0%,#0a1628 40%,#071420 100%);min-height:100vh;color:var(--white);}
  header{background:linear-gradient(90deg,#060f20,#0d1f3c,#060f20);border-bottom:2px solid var(--gold);padding:18px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.6);}
  header h1{font-size:1.4rem;color:var(--gold-light);letter-spacing:.5px;}
  .subtitle{font-size:.8rem;color:var(--gray);margin-top:2px;}
  .logo{font-size:2rem;filter:drop-shadow(0 0 8px var(--gold));}
  .hdr-right{margin-left:auto;display:flex;gap:10px;align-items:center;}
  .stats-bar{display:flex;gap:12px;flex-wrap:wrap;padding:14px 24px;background:rgba(10,22,40,.6);border-bottom:1px solid var(--card-border);}
  .stat-chip{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:5px 14px;font-size:.82rem;display:flex;align-items:center;gap:6px;}
  .stat-chip .val{color:var(--gold-light);font-weight:700;}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;padding:14px 24px;background:rgba(8,18,36,.4);border-bottom:1px solid var(--card-border);}
  .toolbar input,.toolbar select{background:var(--card-bg);border:1px solid var(--card-border);color:var(--white);border-radius:8px;padding:7px 12px;font-size:.85rem;outline:none;transition:border .2s;}
  .toolbar input:focus,.toolbar select:focus{border-color:var(--ocean-light);}
  .toolbar input{flex:1;min-width:180px;}
  main{padding:20px 24px 60px;max-width:1400px;margin:0 auto;}
  .dest-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:var(--radius);margin-bottom:22px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.4);}
  .dest-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:linear-gradient(90deg,var(--navy3),var(--navy2));cursor:pointer;user-select:none;border-bottom:1px solid var(--card-border);}
  .dest-header:hover{background:linear-gradient(90deg,#1e4070,#152e55);}
  .dest-icon{font-size:1.4rem;}.dest-name{font-size:1.15rem;font-weight:700;color:var(--gold-light);letter-spacing:.3px;}
  .dest-pax-total{background:rgba(200,168,75,.15);border:1px solid var(--gold);color:var(--gold-light);border-radius:14px;padding:3px 11px;font-size:.78rem;font-weight:600;}
  .dest-count{background:rgba(30,95,168,.2);border:1px solid var(--ocean);color:#7eb8f7;border-radius:14px;padding:3px 11px;font-size:.78rem;}
  .collapse-btn{margin-left:auto;color:var(--gray);font-size:1rem;transition:transform .25s;}
  .collapsed .collapse-btn{transform:rotate(-90deg);}
  .dest-body{overflow-x:auto;}
  .ships-table{width:100%;border-collapse:collapse;font-size:.88rem;}
  .ships-table th{background:rgba(10,30,60,.7);color:var(--gray);font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--card-border);cursor:pointer;white-space:nowrap;}
  .ships-table th:hover{color:var(--white);}
  .ships-table th.sorted .si{color:var(--gold-light);opacity:1;}
  .si{margin-left:4px;opacity:.4;}
  .ships-table td{padding:10px 14px;border-bottom:1px solid rgba(30,53,96,.4);vertical-align:middle;}
  .ships-table tr:last-child td{border-bottom:none;}
  .ships-table tr:hover td{background:rgba(30,80,150,.12);}
  .badge{display:inline-block;border-radius:12px;padding:3px 10px;font-size:.75rem;font-weight:600;white-space:nowrap;}
  .b-past{background:rgba(224,64,64,.2);border:1px solid #e04040;color:#f08080;}
  .b-today{background:rgba(241,196,15,.2);border:1px solid #f1c40f;color:#f5d060;}
  .b-soon{background:rgba(46,204,113,.2);border:1px solid #2ecc71;color:#6ee0a0;}
  .b-future{background:rgba(52,152,219,.2);border:1px solid #3498db;color:#80bfee;}
  .b-big{background:rgba(224,64,64,.2);border:1px solid #c03030;color:#f08080;}
  .b-med{background:rgba(241,196,15,.15);border:1px solid #c8a020;color:#f0d050;}
  .b-sml{background:rgba(46,204,113,.15);border:1px solid #27ae60;color:#6ee0a0;}
  .ship-name{font-weight:600;color:var(--white);}
  .note-txt{color:var(--gray);font-size:.8rem;}
  .row-actions{display:flex;gap:6px;}
  .btn-sm{background:none;border:1px solid var(--card-border);color:var(--gray);border-radius:6px;padding:3px 8px;font-size:.75rem;cursor:pointer;transition:all .15s;}
  .btn-sm:hover{border-color:var(--ocean-light);color:var(--white);}
  .btn-del:hover{border-color:var(--red);color:#f08080;}
  .add-row-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;background:rgba(10,22,40,.5);border-top:1px dashed var(--card-border);cursor:pointer;color:var(--gray);font-size:.83rem;transition:color .2s;}
  .add-row-btn:hover{color:var(--gold-light);}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:#0d1f3c;border:1px solid var(--ocean);border-radius:14px;padding:28px;width:440px;max-width:96vw;box-shadow:0 20px 60px rgba(0,0,0,.8);}
  .modal h2{color:var(--gold-light);margin-bottom:18px;font-size:1.1rem;}
  .fg{margin-bottom:14px;}
  .fg label{display:block;color:var(--gray);font-size:.8rem;margin-bottom:5px;}
  .fg input,.fg select{width:100%;background:#060f20;border:1px solid var(--card-border);color:var(--white);border-radius:8px;padding:9px 12px;font-size:.9rem;outline:none;transition:border .2s;}
  .fg input:focus,.fg select:focus{border-color:var(--ocean-light);}
  .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end;}
  .btn-pri{background:var(--ocean);border:none;color:#fff;border-radius:8px;padding:9px 20px;font-size:.9rem;cursor:pointer;transition:background .2s;}
  .btn-pri:hover{background:var(--ocean-light);}
  .btn-sec{background:none;border:1px solid var(--card-border);color:var(--gray);border-radius:8px;padding:9px 20px;font-size:.9rem;cursor:pointer;}
  .btn-sec:hover{border-color:var(--gray);color:var(--white);}
  .no-ships{padding:24px;text-align:center;color:var(--gray);font-size:.9rem;}
  .btn-hdr{background:rgba(30,95,168,.2);border:1px solid var(--ocean);color:#7eb8f7;border-radius:8px;padding:7px 14px;font-size:.82rem;cursor:pointer;transition:all .2s;}
  .btn-hdr:hover{background:rgba(30,95,168,.4);color:var(--white);}
  .btn-danger{background:rgba(224,64,64,.15);border:1px solid var(--red);color:#f08080;}
  .btn-danger:hover{background:rgba(224,64,64,.3);}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:var(--navy);}
  ::-webkit-scrollbar-thumb{background:var(--navy3);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--ocean);}
  @media(max-width:600px){main{padding:12px;}.stats-bar,.toolbar{padding:10px 12px;}header{padding:12px;}header h1{font-size:1.1rem;}}
</style>
</head>
<body>
<header>
  <div class="logo">⚓</div>
  <div>
    <h1>Norwegian Fjords Cruise Tracker 2026</h1>
    <div class="subtitle">Olden · Hellesylt · Geiranger &mdash; Official port schedules &bull; Ships &ge;5h only</div>
  </div>
  <div class="hdr-right">
    <button class="btn-hdr" onclick="resetData()">↺ Reset</button>
    <button class="btn-hdr btn-danger" onclick="clearCustom()">🗑 Clear custom</button>
  </div>
</header>
<div class="stats-bar" id="statsBar"></div>
<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍  Search ships…" oninput="renderAll()">
  <select id="monthFilter" onchange="renderAll()">
    <option value="">All months</option>
    <option value="04">April</option><option value="05">May</option>
    <option value="06">June</option><option value="07">July</option>
    <option value="08">August</option><option value="09">September</option>
    <option value="10">October</option><option value="11">November</option>
  </select>
  <select id="paxFilter" onchange="renderAll()">
    <option value="">All sizes</option>
    <option value="big">Large (&ge;4 000 pax)</option>
    <option value="medium">Medium (1 500–3 999)</option>
    <option value="small">Small (&lt;1 500)</option>
  </select>
</div>
<main id="mainContent"></main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Ship</h2>
    <div class="fg"><label>Destination</label><select id="fDest"></select></div>
    <div class="fg"><label>Ship Name</label><input type="text" id="fName" placeholder="e.g. MSC EURIBIA"></div>
    <div class="fg"><label>Arrival Date</label><input type="date" id="fDate"></div>
    <div class="fg"><label>Passengers (pax)</label><input type="number" id="fPax" placeholder="e.g. 3000" min="0"></div>
    <div class="fg"><label>Note (times, berth…)</label><input type="text" id="fNote" placeholder="e.g. 08:00–18:00"></div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeModal()">Cancel</button>
      <button class="btn-pri" onclick="saveShip()">Save</button>
    </div>
  </div>
</div>

let state=loadData();
let editShipId=null,editDestId=null;
let sortCfg={};

function loadData(){
  try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));return(s&&Array.isArray(s)&&s.length>0)?s:clone(SEED_DATA);}
  catch{return clone(SEED_DATA);}
}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function clone(x){return JSON.parse(JSON.stringify(x));}
function uid(){return'u'+Date.now()+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function resetData(){
  if(!confirm('Reset to official schedule? Custom additions will be lost.'))return;
  state=clone(SEED_DATA);save();renderAll();
}
function clearCustom(){
  const ids=new Set(SEED_DATA.flatMap(d=>d.ships.map(s=>s.id)));
  state.forEach(d=>{d.ships=d.ships.filter(s=>ids.has(s.id));});
  save();renderAll();
}

function dateBadge(a){
  if(a<TODAY)return`<span class="badge b-past">Past</span>`;
  if(a===TODAY)return`<span class="badge b-today">Today</span>`;
  const d=Math.round((new Date(a)-new Date(TODAY))/86400000);
  if(d<=7)return`<span class="badge b-soon">${d}d</span>`;
  const dt=new Date(a);
  return`<span class="badge b-future">${dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>`;
}
function paxBadge(p){
  if(!p)return`<span class="badge" style="color:#555;border:1px solid #333">—</span>`;
  const f=p>=1000?(p/1000).toFixed(1)+'k':p;
  if(p>=4000)return`<span class="badge b-big">🔴 ${f}</span>`;
  if(p>=1500)return`<span class="badge b-med">🟡 ${f}</span>`;
  return`<span class="badge b-sml">🟢 ${f}</span>`;
}
function fmtPax(n){return n>=1000000?(n/1000000).toFixed(2)+'M':n>=1000?Math.round(n/1000)+'k':n;}
function totalPax(ships){return ships.reduce((a,s)=>a+(s.pax||0),0);}

function filterShips(ships){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const mo=document.getElementById('monthFilter')?.value||'';
  const pf=document.getElementById('paxFilter')?.value||'';
  return ships.filter(s=>{
    if(q&&!s.name.toLowerCase().includes(q))return false;
    if(mo&&s.arrival.slice(5,7)!==mo)return false;
    if(pf==='big'&&s.pax<4000)return false;
    if(pf==='medium'&&(s.pax<1500||s.pax>=4000))return false;
    if(pf==='small'&&s.pax>=1500)return false;
    return true;
  });
}

function sortShips(ships,did){
  const c=sortCfg[did]||{col:'arrival',dir:1};
  return[...ships].sort((a,b)=>{
    let va=a[c.col],vb=b[c.col];
    if(typeof va==='string'){va=va.toLowerCase();vb=vb.toLowerCase();}
    return va<vb?-c.dir:va>vb?c.dir:0;
  });
}
function toggleSort(did,col){
  const c=sortCfg[did]||{col:'arrival',dir:1};
  sortCfg[did]={col,dir:c.col===col?-c.dir:1};
  renderAll();
}
function si(did,col){
  const c=sortCfg[did];
  if(!c||c.col!==col)return`<span class="si">↕</span>`;
  return`<span class="si">${c.dir===1?'↑':'↓'}</span>`;
}

function renderAll(){
  renderStats();
  document.getElementById('mainContent').innerHTML=state.map(d=>renderDest(d)).join('');
}

function renderStats(){
  const all=state.flatMap(d=>d.ships);
  const tp=totalPax(all);
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-chip">⚓ Total: <span class="val">${all.length}</span></div>
    <div class="stat-chip">📅 Upcoming: <span class="val">${all.filter(s=>s.arrival>=TODAY).length}</span></div>
    <div class="stat-chip">🌊 In port today: <span class="val">${all.filter(s=>s.arrival===TODAY).length}</span></div>
    <div class="stat-chip">🗺️ Destinations: <span class="val">${state.length}</span></div>
    <div class="stat-chip">👥 Total pax: <span class="val">${fmtPax(tp)}</span></div>`;
}

function renderDest(d){
  const f=filterShips(d.ships);
  const sorted=sortShips(f,d.id);
  const pt=totalPax(f);
  const cc=d.collapsed?'collapsed':'';
  const thc=col=>col===(sortCfg[d.id]||{}).col?'sorted':'';
  let rows='';
  if(!d.collapsed){
    if(!sorted.length){rows=`<tr><td colspan="5" class="no-ships">No ships match the current filters.</td></tr>`;}
    else{rows=sorted.map(s=>`<tr>
      <td>${dateBadge(s.arrival)}</td>
      <td class="ship-name">${esc(s.name)}</td>
      <td>${paxBadge(s.pax)}</td>
      <td class="note-txt">${esc(s.note||'')}</td>
      <td><div class="row-actions">
        <button class="btn-sm" onclick="openEdit('${esc(d.id)}','${esc(s.id)}')">✏️</button>
        <button class="btn-sm btn-del" onclick="delShip('${esc(d.id)}','${esc(s.id)}')">✕</button>
      </div></td>
    </tr>`).join('');}
  }
  return`<div class="dest-card" id="dc-${esc(d.id)}">
    <div class="dest-header ${cc}" onclick="toggleCol('${esc(d.id)}')">
      <span class="dest-icon">${d.icon||'⚓'}</span>
      <span class="dest-name">${esc(d.name)}</span>
      <span class="dest-count">${f.length} ship${f.length!==1?'s':''}</span>
      <span class="dest-pax-total">👥 ${fmtPax(pt)} pax</span>
      <span class="collapse-btn">▼</span>
    </div>
    ${!d.collapsed?`<div class="dest-body">
      <table class="ships-table"><thead><tr>
        <th class="${thc('arrival')}" onclick="toggleSort('${esc(d.id)}','arrival')">Date ${si(d.id,'arrival')}</th>
        <th class="${thc('name')}" onclick="toggleSort('${esc(d.id)}','name')">Ship ${si(d.id,'name')}</th>
        <th class="${thc('pax')}" onclick="toggleSort('${esc(d.id)}','pax')">Pax ${si(d.id,'pax')}</th>
        <th>Schedule</th><th></th>
      </tr></thead><tbody>${rows}</tbody></table>
      <div class="add-row-btn" onclick="openAdd('${esc(d.id)}')">＋ Add ship to ${esc(d.name)}</div>
    </div>`:''}
  </div>`;
}

function toggleCol(did){
  const d=state.find(x=>x.id===did);
  if(d){d.collapsed=!d.collapsed;save();renderAll();}
}

function populateDest(sel){
  document.getElementById('fDest').innerHTML=state.map(d=>`<option value="${esc(d.id)}"${d.id===sel?' selected':''}>${esc(d.name)}</option>`).join('');
}

function openAdd(did){
  editShipId=null;editDestId=did;
  document.getElementById('modalTitle').textContent='Add Ship';
  document.getElementById('fName').value='';
  document.getElementById('fDate').value='2026-07-01';
  document.getElementById('fPax').value='';
  document.getElementById('fNote').value='';
  populateDest(did);
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('fName').focus();
}

function openEdit(did,sid){
  const d=state.find(x=>x.id===did);
  const s=d?.ships.find(x=>x.id===sid);
  if(!s)return;
  editShipId=sid;editDestId=did;
  document.getElementById('modalTitle').textContent='Edit Ship';
  document.getElementById('fName').value=s.name;
  document.getElementById('fDate').value=s.arrival;
  document.getElementById('fPax').value=s.pax||'';
  document.getElementById('fNote').value=s.note||'';
  populateDest(did);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editShipId=null;editDestId=null;}

function saveShip(){
  const did=document.getElementById('fDest').value;
  const name=document.getElementById('fName').value.trim().toUpperCase();
  const arrival=document.getElementById('fDate').value;
  const pax=parseInt(document.getElementById('fPax').value)||0;
  const note=document.getElementById('fNote').value.trim();
  if(!name||!arrival){alert('Please enter ship name and arrival date.');return;}
  const dest=state.find(d=>d.id===did);
  if(!dest)return;
  if(editShipId){
    for(const d of state){
      const idx=d.ships.findIndex(s=>s.id===editShipId);
      if(idx!==-1){
        if(d.id===did){d.ships[idx]={...d.ships[idx],name,arrival,pax,note};}
        else{const ship=d.ships.splice(idx,1)[0];ship.name=name;ship.arrival=arrival;ship.pax=pax;ship.note=note;dest.ships.push(ship);}
        break;
      }
    }
  }else{dest.ships.push({id:uid(),name,arrival,pax,note});}
  save();closeModal();renderAll();
}

function delShip(did,sid){
  if(!confirm('Remove this ship?'))return;
  const d=state.find(x=>x.id===did);
  if(d){d.ships=d.ships.filter(s=>s.id!==sid);save();renderAll();}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modalOverlay').classList.contains('open'))saveShip();
});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
renderAll();
</script>
</body>
</html>
